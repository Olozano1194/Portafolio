<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Sans+Mono:ital,wght@0,400..700;1,400..700&family=Inter:wght@100..900&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    <title>Oscar Lozano | Full-Stack Developer</title>
    <meta name="description" content="Portafolio de Oscar Lozano, Ingeniero de Sistemas y desarrollador Full-Stack especializado en React, TypeScript y Django. Proyectos, habilidades y experiencia en desarrollo web." />
    <script>
      // Apply dark theme immediately to prevent flash
      (function() {
        const theme = localStorage.getItem('portfolio-theme');
        // Default to dark if no theme saved
        if (!theme) {
          document.documentElement.classList.add('dark');
        } else if (theme === 'light') {
          document.documentElement.classList.add('light');
        } else {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="font-body selection:bg-primary selection:text-on-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
